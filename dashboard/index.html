<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Recorder — Agent Telemetry</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d2991d;
    --cyan: #39d2c0; --purple: #a371f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  .app { display: flex; height: 100vh; }
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
  .sidebar h1 { font-size: 18px; color: var(--accent); margin-bottom: 8px; }
  .sidebar .subtitle { font-size: 12px; color: var(--dim); margin-bottom: 24px; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  .stat-box .label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-box .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
  .stat-box .value.green { color: var(--green); }
  .nav-item { display: block; width: 100%; text-align: left; padding: 8px 12px; border-radius: 6px; border: none; background: none; color: var(--text); cursor: pointer; font-size: 13px; margin-bottom: 4px; }
  .nav-item:hover { background: rgba(255,255,255,0.05); }
  .nav-item.active { background: rgba(88,166,255,0.12); color: var(--accent); }
  .main { flex: 1; overflow-y: auto; padding: 32px; }
  .run-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; }
  .run-card:hover { border-color: var(--accent); }
  .run-card .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .run-card .name { font-weight: 600; }
  .run-card .meta { font-size: 12px; color: var(--dim); display: flex; gap: 16px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge.completed { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge.failed { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge.running { background: rgba(210,153,29,0.15); color: var(--yellow); }
  .timeline { margin-top: 24px; }
  .step { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .step-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .step-icon.llm { background: rgba(163,113,247,0.15); }
  .step-icon.tool { background: rgba(57,210,194,0.15); }
  .step-body { flex: 1; }
  .step-body .header { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .step-body .detail { font-size: 12px; color: var(--dim); }
  .step-body .preview { font-size: 12px; color: var(--dim); background: var(--bg); padding: 8px; border-radius: 4px; margin-top: 6px; font-family: monospace; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
  .back-btn { background: none; border: 1px solid var(--border); color: var(--accent); padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 20px; }
  .back-btn:hover { background: rgba(88,166,255,0.1); }
  .chart-bar { display: flex; gap: 4px; align-items: flex-end; height: 80px; margin: 16px 0; }
  .chart-bar .bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; position: relative; }
  .chart-bar .bar:hover { background: #79c0ff; }
  .chart-label { font-size: 10px; color: var(--dim); text-align: center; margin-top: 4px; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--dim); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = "http://127.0.0.1:8421/api";

// ── Helpers ──

function formatCost(c) { return `$${Number(c).toFixed(4)}`; }
function formatMs(ms) { return `${Math.round(ms)}ms`; }
function formatTokens(n) { return Number(n).toLocaleString(); }
function timeAgo(ts) {
  const diff = (Date.now() / 1000) - ts;
  if (diff < 60) return `${Math.round(diff)}s ago`;
  if (diff < 3600) return `${Math.round(diff/60)}m ago`;
  if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
  return `${Math.round(diff/86400)}d ago`;
}

// ── App ──

function App() {
  const [view, setView] = useState("runs");
  const [selectedRunId, setSelectedRunId] = useState(null);
  const [runs, setRuns] = useState([]);
  const [stats, setStats] = useState(null);
  const [runDetail, setRunDetail] = useState(null);
  const [trends, setTrends] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(() => { fetchStats(); fetchRuns(); fetchTrends(); }, []);

  async function fetchStats() {
    try { const r = await fetch(`${API}/stats`); setStats(await r.json()); } catch(e) {}
  }
  async function fetchRuns() {
    try { const r = await fetch(`${API}/runs?limit=50`); setRuns((await r.json()).runs); } catch(e) {}
  }
  async function fetchTrends() {
    try { const r = await fetch(`${API}/stats/trends?days=14`); setTrends((await r.json()).trends); } catch(e) {}
  }
  async function fetchRunDetail(id) {
    setLoading(true);
    try {
      const [runR, evalR] = await Promise.all([
        fetch(`${API}/runs/${id}`),
        fetch(`${API}/runs/${id}/evals`),
      ]);
      const run = await runR.json();
      const evals = await evalR.json();
      setRunDetail({...run, evaluations: evals.evaluations});
      setSelectedRunId(id);
      setView("detail");
    } catch(e) { console.error(e); }
    setLoading(false);
  }

  return (
    <div className="app">
      <Sidebar stats={stats} view={view} setView={setView} onRefresh={() => { fetchStats(); fetchRuns(); fetchTrends(); }} />
      <div className="main">
        {view === "runs" && <RunsList runs={runs} onSelect={fetchRunDetail} />}
        {view === "detail" && runDetail && <RunDetail run={runDetail} onBack={() => { setView("runs"); setSelectedRunId(null); }} />}
        {view === "trends" && <TrendsView trends={trends} />}
      </div>
    </div>
  );
}

function Sidebar({ stats, view, setView, onRefresh }) {
  return (
    <div className="sidebar">
      <h1>✈️ Flight Recorder</h1>
      <div className="subtitle">Agent Telemetry Dashboard</div>

      {stats && (
        <>
          <div className="stat-box">
            <div className="label">Total Runs</div>
            <div className="value">{stats.total_runs}</div>
          </div>
          <div className="stat-box">
            <div className="label">Total Cost</div>
            <div className="value">${Number(stats.total_cost).toFixed(3)}</div>
          </div>
          <div className="stat-box">
            <div className="label">Avg Latency</div>
            <div className="value">{Math.round(stats.avg_latency_ms)}ms</div>
          </div>
          <div className="stat-box">
            <div className="label">Pass Rate</div>
            <div className={"value " + (stats.completed_runs > 0 ? "green" : "")}>
              {stats.total_runs > 0 ? Math.round(stats.completed_runs / stats.total_runs * 100) : 0}%
            </div>
          </div>
        </>
      )}

      <button className={"nav-item " + (view === "runs" ? "active" : "")} onClick={() => setView("runs")}>📋 Runs</button>
      <button className={"nav-item " + (view === "trends" ? "active" : "")} onClick={() => setView("trends")}>📈 Trends</button>
      <button className="nav-item" onClick={onRefresh} style={{marginTop: 16, color: "var(--dim)"}}>🔄 Refresh</button>
    </div>
  );
}

function RunsList({ runs, onSelect }) {
  if (!runs.length) {
    return (
      <div className="empty-state">
        <div className="icon">📡</div>
        <h2>No runs recorded yet</h2>
        <p>Instrument your agent with Flight Recorder and runs will appear here.</p>
      </div>
    );
  }
  return (
    <div>
      <h2 style={{marginBottom: 20}}>📋 Recent Runs</h2>
      {runs.map(run => (
        <div key={run.id} className="run-card" onClick={() => onSelect(run.id)}>
          <div className="top">
            <span className="name">{run.name}</span>
            <span className={"badge " + run.status}>{run.status}</span>
          </div>
          <div className="meta">
            <span>{run.agent_name || "unknown agent"}</span>
            <span>{run.step_count} steps</span>
            <span>{formatCost(run.total_cost)}</span>
            <span>{formatMs(run.total_latency_ms)}</span>
            <span>{formatTokens(run.total_tokens_in + run.total_tokens_out)} tokens</span>
            <span>{timeAgo(run.started_at)}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function RunDetail({ run, onBack }) {
  const allSteps = [];
  (run.llm_calls || []).forEach(c => allSteps.push({type: "llm", step: c.step_index, data: c}));
  (run.tool_calls || []).forEach(c => allSteps.push({type: "tool", step: c.step_index, data: c}));
  allSteps.sort((a, b) => a.step - b.step);

  return (
    <div>
      <button className="back-btn" onClick={onBack}>← Back to runs</button>
      <h2>{run.name}</h2>
      <div className="meta" style={{marginTop: 8}}>
        <span>Agent: {run.agent_name || "unknown"}</span>
        <span>Status: <span className={"badge " + run.status}>{run.status}</span></span>
        <span>Cost: {formatCost(run.total_cost)}</span>
        <span>Tokens: {formatTokens(run.total_tokens_in)}↑ {formatTokens(run.total_tokens_out)}↓</span>
        <span>Latency: {formatMs(run.total_latency_ms)}</span>
      </div>

      {run.evaluations && run.evaluations.length > 0 && (
        <div style={{marginTop: 20, marginBottom: 20}}>
          <h3 style={{marginBottom: 8}}>📊 Evaluations</h3>
          {run.evaluations.map(ev => (
            <div key={ev.id} style={{display: "inline-block", marginRight: 12, padding: "8px 12px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 6}}>
              <span style={{fontWeight: 600, fontSize: 13}}>{ev.task_id}</span>
              <span style={{marginLeft: 8, color: ev.passed ? "var(--green)" : "var(--red)", fontSize: 20}}>{ev.passed ? "✓" : "✗"}</span>
              <span style={{marginLeft: 4, fontSize: 12, color: "var(--dim)"}}>{Number(ev.score).toFixed(2)}</span>
            </div>
          ))}
        </div>
      )}

      <div className="timeline">
        <h3 style={{marginBottom: 12}}>⏱ Timeline ({allSteps.length} steps)</h3>
        {allSteps.map((s, i) => (
          <div key={i} className="step">
            <div className={"step-icon " + s.type}>{s.type === "llm" ? "🤖" : "🔧"}</div>
            <div className="step-body">
              <div className="header">
                Step {s.data.step_index}: {s.type === "llm" ? `LLM → ${s.data.model}` : `Tool: ${s.data.name}`}
                <span style={{marginLeft: 12, fontSize: 12, color: "var(--dim)"}}>
                  {s.type === "llm"
                    ? `${formatTokens(s.data.tokens_in)}↑ ${formatTokens(s.data.tokens_out)}↓  ${formatCost(s.data.cost)}  ${formatMs(s.data.latency_ms)}`
                    : `${formatMs(s.data.latency_ms)}  ${s.data.success ? "✅" : "❌"}`
                  }
                </span>
              </div>
              {s.data.error && <div className="detail" style={{color: "var(--red)"}}>Error: {s.data.error}</div>}
              {s.type === "llm" && s.data.prompt && (
                <details style={{marginTop: 4}}>
                  <summary style={{fontSize: 12, color: "var(--accent)", cursor: "pointer"}}>Prompt</summary>
                  <div className="preview">{s.data.prompt}</div>
                </details>
              )}
              {s.type === "llm" && s.data.response && (
                <details style={{marginTop: 4}}>
                  <summary style={{fontSize: 12, color: "var(--accent)", cursor: "pointer"}}>Response</summary>
                  <div className="preview">{s.data.response}</div>
                </details>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TrendsView({ trends }) {
  if (!trends.length) {
    return <div className="empty-state"><div className="icon">📈</div><h2>No trend data yet</h2></div>;
  }
  const maxRuns = Math.max(...trends.map(t => t.runs), 1);
  const maxCost = Math.max(...trends.map(t => t.cost), 0.01);

  return (
    <div>
      <h2 style={{marginBottom: 20}}>📈 14-Day Trends</h2>
      <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24}}>
        <div>
          <h4 style={{marginBottom: 8, color: "var(--dim)", fontSize: 12, textTransform: "uppercase"}}>Runs per Day</h4>
          <div className="chart-bar">
            {trends.map((t, i) => (
              <div key={i} style={{flex: 1, textAlign: "center"}}>
                <div className="bar" style={{height: `${(t.runs / maxRuns) * 80}px`}} title={`${t.day}: ${t.runs} runs`}></div>
                <div className="chart-label">{t.day.slice(5)}</div>
              </div>
            ))}
          </div>
        </div>
        <div>
          <h4 style={{marginBottom: 8, color: "var(--dim)", fontSize: 12, textTransform: "uppercase"}}>Cost per Day</h4>
          <div className="chart-bar">
            {trends.map((t, i) => (
              <div key={i} style={{flex: 1, textAlign: "center"}}>
                <div className="bar" style={{height: `${(t.cost / maxCost) * 80}px`, background: "var(--purple)"}} title={`${t.day}: $${t.cost.toFixed(4)}`}></div>
                <div className="chart-label">{t.day.slice(5)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
